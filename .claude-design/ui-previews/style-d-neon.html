<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seeku UI Preview - Style D: Neon Cyber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0f1c;
      --bg-card: #141b2d;
      --bg-light: #1a2744;
      --accent-cyan: #00ffcc;
      --accent-magenta: #ff00aa;
      --accent-blue: #4361ee;
      --text-primary: #e8e8e8;
      --text-muted: #8892b0;
      --glow-cyan: 0 0 20px rgba(0, 255, 204, 0.3);
      --glow-magenta: 0 0 20px rgba(255, 0, 170, 0.3);
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      /* Grid pattern overlay */
      background-image:
        linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .header {
      background: var(--bg-card);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0, 255, 204, 0.2);
      animation: slideDown 0.6s ease-out;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--accent-cyan);
    }

    .logo span { color: var(--accent-magenta); }

    .nav {
      display: flex;
      gap: 24px;
    }

    .nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .nav a:hover {
      color: var(--accent-cyan);
      text-shadow: var(--glow-cyan);
    }

    /* Search Section */
    .search-section {
      padding: 80px 32px;
      text-align: center;
      position: relative;
    }

    /* Particle effect simulation */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-cyan);
      border-radius: 50%;
      opacity: 0.5;
      animation: float 3s ease-in-out infinite;
    }

    .search-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    .search-title span { color: var(--accent-cyan); }

    .search-subtitle {
      color: var(--text-muted);
      font-size: 18px;
      margin-bottom: 48px;
      animation: fadeIn 0.8s ease-out 0.4s both;
    }

    .search-box {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      animation: fadeIn 0.8s ease-out 0.6s both;
    }

    .search-input {
      width: 100%;
      padding: 18px 24px;
      font-size: 16px;
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-card);
      border: 1px solid var(--accent-cyan);
      border-radius: var(--radius);
      color: var(--text-primary);
      transition: box-shadow 0.2s;
    }

    .search-input:focus {
      outline: none;
      box-shadow: var(--glow-cyan);
    }

    .search-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent-cyan);
      color: var(--bg-deep);
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .search-btn:hover { box-shadow: var(--glow-cyan); }

    /* Results */
    .results-section {
      padding: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      animation: fadeIn 0.8s ease-out 0.8s both;
    }

    .results-count {
      font-size: 14px;
      color: var(--text-muted);
    }

    .results-count span { color: var(--accent-cyan); font-weight: 700; }

    /* Cards */
    .candidate-card {
      background: var(--bg-card);
      border: 1px solid rgba(0, 255, 204, 0.1);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: slideUp 0.6s ease-out both;
      animation-delay: calc(var(--delay) * 0.1s);
    }

    .candidate-card:nth-child(1) { --delay: 1; }
    .candidate-card:nth-child(2) { --delay: 2; }
    .candidate-card:nth-child(3) { --delay: 3; }

    .candidate-card:hover {
      border-color: var(--accent-cyan);
      box-shadow: var(--glow-cyan);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg-deep);
      font-family: 'ZCOOL KuaiLe', sans-serif;
      font-size: 24px;
    }

    .card-info { flex: 1; }

    .candidate-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .candidate-headline {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .match-score {
      display: inline-flex;
      background: var(--accent-cyan);
      color: var(--bg-deep);
      padding: 4px 12px;
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
    }

    .match-reasons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .reason-tag {
      background: rgba(255, 0, 170, 0.2);
      color: var(--accent-magenta);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid rgba(255, 0, 170, 0.3);
    }

    .evidence-preview {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 255, 204, 0.1);
      display: flex;
      gap: 16px;
    }

    .evidence-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .evidence-icon {
      width: 14px;
      height: 14px;
      background: var(--accent-cyan);
      border-radius: 2px;
      opacity: 0.6;
    }

    /* Animations */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-10px); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">SEEK<span>U</span></div>
    <nav class="nav">
      <a href="#">搜索</a>
      <a href="#">评估</a>
      <a href="#">管理</a>
    </nav>
  </header>

  <section class="search-section">
    <div class="particle" style="left: 10%; top: 20%;"></div>
    <div class="particle" style="left: 80%; top: 30%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 50%; top: 60%; animation-delay: 2s;"></div>
    <h1 class="search-title"><span>发现</span>AI人才</h1>
    <p class="search-subtitle">通过代码证据，找到真正的技术专家</p>
    <div class="search-box">
      <input class="search-input" type="text" placeholder="Python RAG工程师 北京 5年经验" value="AI工程师 北京">
      <button class="search-btn">SEARCH</button>
    </div>
  </section>

  <section class="results-section">
    <div class="results-header">
      <span class="results-count">找到 <span>12</span> 位匹配候选人</span>
    </div>

    <div class="candidate-card">
      <div class="card-header">
        <div class="avatar">张</div>
        <div class="card-info">
          <h3 class="candidate-name">张明远</h3>
          <p class="candidate-headline">字节跳动 · AI算法工程师 · 6年</p>
          <span class="match-score">94.2</span>
        </div>
      </div>
      <div class="match-reasons">
        <span class="reason-tag">Python</span>
        <span class="reason-tag">RAG</span>
        <span class="reason-tag">北京</span>
      </div>
      <div class="evidence-preview">
        <div class="evidence-item"><div class="evidence-icon"></div> LangChain</div>
        <div class="evidence-item"><div class="evidence-icon"></div> 3项目</div>
        <div class="evidence-item"><div class="evidence-icon"></div> 500+</div>
      </div>
    </div>

    <div class="candidate-card">
      <div class="card-header">
        <div class="avatar">李</div>
        <div class="card-info">
          <h3 class="candidate-name">李思源</h3>
          <p class="candidate-headline">阿里云 · 大模型研究员 · 4年</p>
          <span class="match-score">89.5</span>
        </div>
      </div>
      <div class="match-reasons">
        <span class="reason-tag">LLM</span>
        <span class="reason-tag">向量</span>
      </div>
      <div class="evidence-preview">
        <div class="evidence-item"><div class="evidence-icon"></div> 10论文</div>
        <div class="evidence-item"><div class="evidence-icon"></div> HF</div>
      </div>
    </div>

    <div class="candidate-card">
      <div class="card-header">
        <div class="avatar">王</div>
        <div class="card-info">
          <h3 class="candidate-name">王晓峰</h3>
          <p class="candidate-headline">独立开发者 · NLP工程师 · 3年</p>
          <span class="match-score">82.1</span>
        </div>
      </div>
      <div class="match-reasons">
        <span class="reason-tag">NLP</span>
        <span class="reason-tag">开源</span>
      </div>
      <div class="evidence-preview">
        <div class="evidence-item"><div class="evidence-icon"></div> RAG产品</div>
        <div class="evidence-item"><div class="evidence-icon"></div> 50+</div>
      </div>
    </div>
  </section>
</body>
</html>
