<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seeku UI Preview - Style F: Minimal Glass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --glass-white: rgba(255, 255, 255, 0.95);
      --glass-border: rgba(255, 255, 255, 0.3);
      --text-dark: #1a1a2e;
      --text-light: #ffffff;
      --text-muted: #6b7280;
      --accent-purple: #7c3aed;
      --accent-pink: #ec4899;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      --radius: 24px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      color: var(--text-dark);
    }

    .header {
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeIn 0.6s ease-out;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: -1px;
    }

    .logo span {
      background: linear-gradient(135deg, #f0abfc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav {
      display: flex;
      gap: 32px;
    }

    .nav a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .nav a:hover { opacity: 1; }

    /* Main container - glass effect */
    .main-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 48px;
      background: var(--glass-white);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(10px);
      animation: slideUp 0.8s ease-out 0.2s both;
    }

    .search-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
      text-align: center;
    }

    .search-subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 32px;
      text-align: center;
    }

    .search-box {
      position: relative;
      margin-bottom: 32px;
    }

    .search-input {
      width: 100%;
      padding: 20px 24px;
      padding-right: 64px;
      font-size: 18px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.8);
      border: 2px solid var(--glass-border);
      border-radius: var(--radius-sm);
      color: var(--text-dark);
      transition: border-color 0.2s, background 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-purple);
      background: rgba(255, 255, 255, 0.95);
    }

    .search-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      color: var(--text-light);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .search-btn:hover { transform: translateY(-50%) scale(1.05); }

    /* Results */
    .results-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .results-count {
      font-weight: 600;
      color: var(--text-muted);
    }

    .results-count span { color: var(--accent-purple); }

    /* Cards - soft glass */
    .candidate-card {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      animation: slideUp 0.6s ease-out both;
      animation-delay: calc(var(--delay) * 0.1s);
    }

    .candidate-card:nth-child(1) { --delay: 1; }
    .candidate-card:nth-child(2) { --delay: 2; }
    .candidate-card:nth-child(3) { --delay: 3; }

    .candidate-card:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-4px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      font-weight: 700;
      font-size: 24px;
    }

    .card-info { flex: 1; }

    .candidate-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .candidate-headline {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .match-score {
      display: inline-flex;
      background: var(--accent-purple);
      color: var(--text-light);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }

    .match-reasons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .reason-tag {
      background: rgba(124, 58, 237, 0.1);
      color: var(--accent-purple);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .evidence-preview {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      gap: 16px;
    }

    .evidence-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .evidence-dot {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      border-radius: 50%;
      opacity: 0.6;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">Seek<span>u</span></div>
    <nav class="nav">
      <a href="#">搜索</a>
      <a href="#">评估</a>
      <a href="#">管理</a>
    </nav>
  </header>

  <main class="main-container">
    <h1 class="search-title">发现AI人才</h1>
    <p class="search-subtitle">通过项目与代码证据，找到真正匹配的候选人</p>

    <div class="search-box">
      <input class="search-input" type="text" placeholder="Python RAG工程师 北京 5年" value="AI工程师 北京">
      <button class="search-btn">搜索</button>
    </div>

    <div class="results-header">
      <span class="results-count">找到 <span>12</span> 位候选人</span>
    </div>

    <div class="candidate-card">
      <div class="card-header">
        <div class="avatar">张</div>
        <div class="card-info">
          <h3 class="candidate-name">张明远</h3>
          <p class="candidate-headline">字节跳动 · AI算法工程师 · 6年经验</p>
          <span class="match-score">94.2 匹配</span>
        </div>
      </div>
      <div class="match-reasons">
        <span class="reason-tag">Python</span>
        <span class="reason-tag">RAG</span>
        <span class="reason-tag">北京</span>
      </div>
      <div class="evidence-preview">
        <div class="evidence-item"><div class="evidence-dot"></div> LangChain</div>
        <div class="evidence-item"><div class="evidence-dot"></div> 3项目</div>
        <div class="evidence-item"><div class="evidence-dot"></div> 500+</div>
      </div>
    </div>

    <div class="candidate-card">
      <div class="card-header">
        <div class="avatar">李</div>
        <div class="card-info">
          <h3 class="candidate-name">李思源</h3>
          <p class="candidate-headline">阿里云 · 大模型研究员 · 4年经验</p>
          <span class="match-score">89.5 匹配</span>
        </div>
      </div>
      <div class="match-reasons">
        <span class="reason-tag">LLM</span>
        <span class="reason-tag">向量</span>
      </div>
      <div class="evidence-preview">
        <div class="evidence-item"><div class="evidence-dot"></div> 10论文</div>
        <div class="evidence-item"><div class="evidence-dot"></div> HF</div>
      </div>
    </div>

    <div class="candidate-card">
      <div class="card-header">
        <div class="avatar">王</div>
        <div class="card-info">
          <h3 class="candidate-name">王晓峰</h3>
          <p class="candidate-headline">独立开发者 · NLP工程师 · 3年</p>
          <span class="match-score">82.1 匹配</span>
        </div>
      </div>
      <div class="match-reasons">
        <span class="reason-tag">NLP</span>
        <span class="reason-tag">开源</span>
      </div>
      <div class="evidence-preview">
        <div class="evidence-item"><div class="evidence-dot"></div> RAG产品</div>
        <div class="evidence-item"><div class="evidence-dot"></div> 50+</div>
      </div>
    </div>
  </main>
</body>
</html>
